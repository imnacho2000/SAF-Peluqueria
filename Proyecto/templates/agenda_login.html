<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Acceso a agenda</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>

<body>
    <header class="hero">
        <div>
            <p class="eyebrow">Peluquería masculina</p>
            <h1>Acceso a agenda</h1>
        </div>
    </header>
    <main class="container">
        <section class="panel">
            <form method="post" action="{{ url_for('agenda') }}">
                <label>
                    Contraseña de agenda
                    <input type="password" name="agenda_password" required />
                </label>
                <button type="submit">Entrar</button>
            </form>
            {% if error_message %}
            <p class="muted">{{ error_message }}</p>
            {% endif %}
            <p><a href="{{ url_for('change_agenda_password') }}">Cambiar contraseña</a></p>
        </section>
    </main>
</body>

</html>
